steps:
  # Docker image build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hobbycollection-api:latest'
      - '-f'
      - 'HobbyCollection.Api/Dockerfile'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/hobbycollection-api:latest'

  # Deploy to Cloud Run with Cloud SQL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['JWT_KEY', 'DB_PASSWORD']
    args:
      - '-c'
      - |
        gcloud run deploy hobbycollection-api \
          --image gcr.io/$PROJECT_ID/hobbycollection-api:latest \
          --region europe-west1 \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 2Gi \
          --cpu 2 \
          --timeout 300 \
          --max-instances 10 \
          --add-cloudsql-instances fresh-inscriber-472521-t7:europe-west1:hobbycollection-db \
          --set-env-vars "ASPNETCORE_ENVIRONMENT=Production,Jwt__Key=$$JWT_KEY,CloudSql__DatabaseName=hobbycollection,CloudSql__UserId=postgres,CloudSql__Password=$$DB_PASSWORD,Smtp__Host=smtp-relay.brevo.com,Smtp__Port=587,Smtp__Username=9490c6001@smtp-brevo.com,Smtp__Password=EOMNg1CtaJ9XGFkn,Smtp__From=noreply@save-all.com,Smtp__FromName=Save All,AppStoreReview__TestEmail=appstore.review@save-all.com,AppStoreReview__TestCode=123456"

images:
  - 'gcr.io/$PROJECT_ID/hobbycollection-api:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/jwt-key/versions/latest
      env: 'JWT_KEY'
    - versionName: projects/$PROJECT_ID/secrets/database-password/versions/latest
      env: 'DB_PASSWORD'

timeout: '1200s'
